name: Advisor Tests

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/tm-advisor-py/**'
      - 'scripts/tm_advisor/**'
      - 'scripts/watch_live_game.py'
      - 'packages/tm-advisor-js/**'
      - 'packages/tm-data/generated/extension/**'
      - 'data/**'
      - '.github/workflows/advisor-tests.yml'
      - 'package.json'
  pull_request:
    paths:
      - 'apps/tm-advisor-py/**'
      - 'scripts/tm_advisor/**'
      - 'scripts/watch_live_game.py'
      - 'packages/tm-advisor-js/**'
      - 'packages/tm-data/generated/extension/**'
      - 'data/**'
      - '.github/workflows/advisor-tests.yml'
      - 'package.json'

jobs:
  advisor:
    name: Advisor regressions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: python -m pip install requests

      - name: Run advisor regression suite
        run: npm run test:advisor
